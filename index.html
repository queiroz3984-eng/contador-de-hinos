<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador e Relatório de Hinos (Firebase)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .status-conexao {
            text-align: center;
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 20px;
        }

        /* --- ESTILOS DO DASHBOARD --- */
        .dashboard {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .dash-card {
            flex: 1;
            background-color: #f8f9fa;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .dash-card h3 {
            font-size: 11px;
            color: #7f8c8d;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .dash-card p {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
        }
        /* ---------------------------- */

        .form-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input[type="number"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            outline: none;
            -moz-appearance: textfield;
        }
        
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"]:focus {
            border-color: #3498db;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #27ae60;
        }

        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 8px 5px;
            font-size: 13px;
            background-color: #e0e0e0;
            color: #555;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background-color: #3498db;
            color: white;
        }

        .historico-section {
            margin-top: 10px;
            max-height: 350px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }

        th {
            background-color: #f8f9fa;
            color: #7f8c8d;
            font-size: 13px;
            text-transform: uppercase;
            position: sticky;
            top: 0;
        }

        td {
            font-size: 16px;
        }

        .hino-num {
            font-weight: bold;
            color: #2c3e50;
        }

        .qtd-badge {
            background-color: #3498db;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
        }
        
        .qtd-badge.menos {
            background-color: #e67e22;
        }

        .qtd-badge.nunca {
            background-color: #95a5a6;
        }

        .btn-limpar {
            background-color: #e74c3c;
            margin-top: 20px;
            width: 100%;
        }

        .btn-limpar:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Contador de Hinos</h1>
        <div id="statusConexao" class="status-conexao">Carregando dados da nuvem...</div>
        
        <div class="dashboard">
            <div class="dash-card">
                <h3>Já Chamados</h3>
                <p id="dashChamados">0</p>
            </div>
            <div class="dash-card">
                <h3>Faltam Chamar</h3>
                <p id="dashFaltam">480</p>
            </div>
            <div class="dash-card">
                <h3>Total Geral</h3>
                <p id="dashTotal">480</p>
            </div>
        </div>

        <div class="form-group">
            <input type="number" id="hinoInput" placeholder="Número do hino..." min="1">
            <button onclick="registrarHino()">Registrar</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="mudarAba('mais', event)">Mais chamados</button>
            <button class="tab-btn" onclick="mudarAba('menos', event)">Menos chamados</button>
            <button class="tab-btn" onclick="mudarAba('nunca', event)">Nunca chamados</button>
        </div>

        <div class="historico-section">
            <table>
                <thead>
                    <tr>
                        <th>Hino</th>
                        <th id="colunaStatus">Status / Qtd</th>
                    </tr>
                </thead>
                <tbody id="tabelaHinos">
                    <tr><td colspan="2" style="text-align:center; color:#95a5a6;">Buscando registros...</td></tr>
                </tbody>
            </table>
        </div>

        <button class="btn-limpar" onclick="limparDados()">Zerar Contagem na Nuvem</button>
    </div>

    <script>
        // ================= CONFIGURAÇÃO DO FIREBASE =================
        const FIREBASE_URL = "https://contador-de-hinos-default-rtdb.firebaseio.com/hinos.json"; 
        const TOTAL_DE_HINOS = 480; 
        // ============================================================

        let controleHinos = {};
        let abaAtual = 'mais';

        baixarDadosFirebase();

        async function baixarDadosFirebase() {
            const statusDiv = document.getElementById('statusConexao');
            try {
                const response = await fetch(FIREBASE_URL);
                const dados = await response.json();
                
                controleHinos = dados ? dados : {};
                
                statusDiv.innerText = "Sincronizado com a Nuvem";
                statusDiv.style.color = "#2ecc71";
                atualizarTabela();
            } catch (error) {
                console.error("Erro ao buscar dados:", error);
                statusDiv.innerText = "Erro ao conectar. Usando dados locais offline.";
                statusDiv.style.color = "#e74c3c";
                
                controleHinos = JSON.parse(localStorage.getItem('controleHinos_backup')) || {};
                atualizarTabela();
            }
        }

        async function registrarHino() {
            const input = document.getElementById('hinoInput');
            const numeroHino = parseInt(input.value.trim());

            if (isNaN(numeroHino) || numeroHino <= 0 || numeroHino > TOTAL_DE_HINOS) {
                alert(`Por favor, digite um número de hino válido (entre 1 e ${TOTAL_DE_HINOS}).`);
                return;
            }

            if (controleHinos[numeroHino]) {
                controleHinos[numeroHino] += 1;
            } else {
                controleHinos[numeroHino] = 1;
            }

            input.value = '';
            input.focus();
            
            atualizarTabela(); 
            await enviarDadosFirebase();
        }

        async function enviarDadosFirebase() {
            try {
                localStorage.setItem('controleHinos_backup', JSON.stringify(controleHinos));
                
                await fetch(FIREBASE_URL, {
                    method: 'PUT',
                    body: JSON.stringify(controleHinos),
                    headers: { 'Content-Type': 'application/json' }
                });
                document.getElementById('statusConexao').innerText = "Alterações salvas na nuvem!";
                document.getElementById('statusConexao').style.color = "#2ecc71";
            } catch (error) {
                console.error("Erro ao salvar dados:", error);
                document.getElementById('statusConexao').innerText = "Erro ao salvar na nuvem (Salvo localmente)";
                document.getElementById('statusConexao').style.color = "#e67e22";
            }
        }

        function mudarAba(aba, event) {
            abaAtual = aba;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            atualizarTabela();
        }

        // Nova função interna para atualizar as estatísticas do Dashboard superior
        function atualizarDashboard(qtdDiferentes) {
            const faltam = TOTAL_DE_HINOS - qtdDiferentes;
            
            document.getElementById('dashChamados').innerText = qtdDiferentes;
            document.getElementById('dashFaltam').innerText = faltam;
            document.getElementById('dashTotal').innerText = TOTAL_DE_HINOS;
        }

        function atualizarTabela() {
            const tbody = document.getElementById('tabelaHinos');
            const colunaStatus = document.getElementById('colunaStatus');
            tbody.innerHTML = '';

            const hinosRegistrados = Object.entries(controleHinos)
                .filter(([hino, qtd]) => hino !== "null" && qtd !== null)
                .map(([hino, qtd]) => [parseInt(hino), qtd]);

            // Atualiza o painel superior com a quantidade de hinos únicos já cadastrados
            atualizarDashboard(hinosRegistrados.length);

            let hinosExibir = [];

            if (abaAtual === 'mais') {
                colunaStatus.innerText = "Vezes Chamado";
                hinosExibir = [...hinosRegistrados].sort((a, b) => b[1] - a[1]);
                if (hinosExibir.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="2" style="text-align:center; color:#95a5a6;">Nenhum hino registrado ainda.</td></tr>`;
                    return;
                }
                gerarLinesTabela(hinosExibir, 'mais');

            } else if (abaAtual === 'menos') {
                colunaStatus.innerText = "Vezes Chamado";
                hinosExibir = [...hinosRegistrados].sort((a, b) => a[1] - b[1]);
                if (hinosExibir.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="2" style="text-align:center; color:#95a5a6;">Nenhum hino registrado ainda.</td></tr>`;
                    return;
                }
                gerarLinesTabela(hinosExibir, 'menos');

            } else if (abaAtual === 'nunca') {
                colunaStatus.innerText = "Status";
                for (let i = 1; i <= TOTAL_DE_HINOS; i++) {
                    if (!controleHinos[i]) {
                        hinosExibir.push([i, 0]);
                    }
                }
                if (hinosExibir.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="2" style="text-align:center; color:#2ecc71; font-weight:bold;">Todos os hinos já foram chamados!</td></tr>`;
                    return;
                }
                gerarLinesTabela(hinosExibir, 'nunca');
            }
        }

        function gerarLinesTabela(listaHinos, tipo) {
            const tbody = document.getElementById('tabelaHinos');
            
            listaHinos.forEach(([hino, quantidade]) => {
                const tr = document.createElement('tr');
                let badgeClass = 'qtd-badge';
                let textoQuantidade = `${quantidade}x`;

                if (tipo === 'menos') badgeClass += ' menos';
                if (tipo === 'nunca') {
                    badgeClass += ' nunca';
                    textoQuantidade = 'Nunca';
                }

                tr.innerHTML = `
                    <td class="hino-num">Hino ${hino}</td>
                    <td><span class="${badgeClass}">${textoQuantidade}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function limparDados() {
            if (confirm('Tem certeza que deseja apagar todo o histórico de contagem na NUVEM?')) {
                controleHinos = {};
                atualizarTabela();
                
                try {
                    await fetch(FIREBASE_URL, { method: 'DELETE' });
                    localStorage.removeItem('controleHinos_backup');
                    document.getElementById('statusConexao').innerText = "Banco de dados zerado!";
                } catch (e) {
                    alert("Erro ao zerar dados na nuvem.");
                }
            }
        }

        document.getElementById('hinoInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                registrarHino();
            }
        });
    </script>
</body>
</html>

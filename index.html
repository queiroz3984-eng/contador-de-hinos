<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="favicon-32x32.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="HandheldFriendly" content="true">
    <title>Contador de Hinos</title>
    <style>
        /* --- CENTRAL DE CORES (VARIÁVEIS DINÂMICAS) --- */
        :root {
            --bg-geral: #f4f7f6;
            --bg-container: #ffffff;
            --texto-principal: #333333;
            --texto-secundario: #7f8c8d;
            --bg-card: #f8f9fa;
            --borda-card: #e2e8f0;
            --texto-destaque: #0284c7;
            --bg-input: #ffffff;
            --texto-input: #333333;
            --borda-input: #bdc3c7;
            --bg-teclado-btn: #eaedd0;
            --texto-teclado-btn: #2c3e50;
            --borda-teclado-btn: #cbd5e1;
            --bg-tab-desativada: #e0e0e0;
            --texto-tab-desativada: #555555;
            --bg-tabela-seccao: #ffffff;
            --borda-tabela: #ecf0f1;
            --bg-tabela-topo: #f8f9fa;
            --badge-menos: #e67e22;
            --badge-nunca: #95a5a6;
            --btn-limpar-bg: #e74c3c;
            --btn-limpar-texto: #ffffff;
            --btn-limpar-borda: #e74c3c;
        }

        /* PALETE DO MODO ESCURO */
        [data-theme="dark"] {
            --bg-geral: #121824;
            --bg-container: #1e293b;
            --texto-principal: #e2e8f0;
            --texto-secundario: #94a3b8;
            --bg-card: #0f172a;
            --borda-card: #334155;
            --texto-destaque: #38bdf8;
            --bg-input: #0f172a;
            --texto-input: #f8fafc;
            --borda-input: #475569;
            --bg-teclado-btn: #334155;
            --texto-teclado-btn: #f1f5f9;
            --borda-teclado-btn: #475569;
            --bg-tab-desativada: #334155;
            --texto-tab-desativada: #94a3b8;
            --bg-tabela-seccao: #0f172a;
            --borda-tabela: #334155;
            --bg-tabela-topo: #1e293b;
            --badge-menos: #b45309;
            --badge-nunca: #475569;
            --btn-limpar-bg: #991b1b;
            --btn-limpar-texto: #fca5a5;
            --btn-limpar-borda: #7f1d1d;
        }

        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
            background-color: var(--bg-geral);
            transition: background-color 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            color: var(--texto-principal);
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--bg-container);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease;
        }

        /* BOTÃO TEMA */
        .theme-toggle-container {
            display: flex;
            justify-content: flex-end;
            width: 100%;
            margin-bottom: 5px;
        }

        .theme-toggle-btn {
            background: transparent;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background-color: var(--bg-card);
            border: 1px solid var(--borda-card);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 10px;
            width: 100%;
        }

        .logo-app {
            max-width: 120px;
            height: auto;
            object-fit: contain;
        }

        h1 {
            text-align: center;
            font-size: 22px;
            color: var(--texto-principal);
            margin-bottom: 3px;
        }

        .status-conexao {
            text-align: center;
            font-size: 11px;
            color: var(--texto-secundario);
            margin-bottom: 15px;
        }

        /* DASHBOARD */
        .dashboard {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
            width: 100%;
        }

        .dash-card {
            flex: 1;
            background-color: var(--bg-card);
            border: 1px solid var(--borda-card);
            border-radius: 8px;
            padding: 10px 2px;
            text-align: center;
        }

        .dash-card h3 {
            font-size: 9px;
            color: var(--texto-secundario);
            text-transform: uppercase;
            margin-bottom: 3px;
            letter-spacing: 0.2px;
        }

        .dash-card p {
            font-size: 18px;
            font-weight: bold;
            color: var(--texto-destaque);
        }

        .form-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            width: 100%;
        }

        input[type="number"] {
            flex: 1;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid var(--borda-input);
            border-radius: 8px;
            outline: none;
            text-align: center;
            background-color: var(--bg-input);
            color: var(--texto-input);
        }

        .tipo-evento-container {
            margin-bottom: 15px;
            width: 100%;
        }

        .tipo-evento-container label {
            display: block;
            margin-bottom: 6px;
            color: var(--texto-secundario);
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .tipo-evento-select {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid var(--borda-input);
            border-radius: 8px;
            background-color: var(--bg-input);
            color: var(--texto-input);
            outline: none;
        }

        /* TECLADO VIRTUAL */
        .teclado-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 20px;
            width: 100%;
        }

        .teclado-btn {
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            background-color: var(--bg-teclado-btn);
            color: var(--texto-teclado-btn);
            border: 1px solid var(--borda-teclado-btn);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .teclado-btn:active {
            opacity: 0.7;
        }

        .teclado-btn.btn-acao-apagar {
            background-color: #7f1d1d;
            color: #fca5a5;
            border-color: #991b1b;
        }
        [data-theme="light"] .teclado-btn.btn-acao-apagar {
            background-color: #fca5a5;
            color: #991b1b;
            border-color: #f87171;
        }

        .teclado-btn.btn-acao-confirmar {
            background-color: #064e3b;
            color: #86efac;
            border-color: #047857;
        }
        [data-theme="light"] .teclado-btn.btn-acao-confirmar {
            background-color: #86efac;
            color: #166534;
            border-color: #4ade80;
        }

        /* ABAS */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--borda-tabela);
            padding-bottom: 5px;
            width: 100%;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 2px;
            font-size: 11px;
            background-color: var(--bg-tab-desativada);
            color: var(--texto-tab-desativada);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-align: center;
        }

        .tab-btn.active {
            background-color: #0284c7;
            color: #ffffff;
        }

        .historico-section {
            margin-top: 5px;
            max-height: 35vh;
            overflow-y: auto;
            border: 1px solid var(--borda-tabela);
            border-radius: 8px;
            width: 100%;
            background-color: var(--bg-tabela-seccao);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid var(--borda-tabela);
        }

        th {
            background-color: var(--bg-tabela-topo);
            color: var(--texto-secundario);
            font-size: 11px;
            text-transform: uppercase;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            font-size: 14px;
            color: var(--texto-principal);
        }

        .hino-num {
            font-weight: bold;
            color: var(--texto-principal);
        }

        .qtd-badge {
            display: inline-block;
            background-color: #0284c7;
            color: white;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            min-width: 45px;
        }
        
        .qtd-badge.menos { background-color: var(--badge-menos); }
        .qtd-badge.nunca { background-color: var(--badge-nunca); }

        .btn-limpar {
            background-color: var(--btn-limpar-bg);
            color: var(--btn-limpar-texto);
            border: 1px solid var(--btn-limpar-borda);
            border-radius: 8px;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="theme-toggle-container">
            <button class="theme-toggle-btn" id="themeToggleBtn" onclick="alternarTema()">
                🌙
            </button>
        </div>

        <div class="logo-container">
            <img src="logo.png" alt="Logo do Aplicativo" class="logo-app">
        </div>

        <h1>Contador de Hinos</h1>
        <div id="statusConexao" class="status-conexao">Carregando dados...</div>
        
        <div class="dashboard">
            <div class="dash-card">
                <h3>Já Chamados</h3>
                <p id="dashChamados">0</p>
            </div>
            <div class="dash-card">
                <h3>Faltam Chamar</h3>
                <p id="dashFaltam">480</p>
            </div>
            <div class="dash-card">
                <h3>Total Geral</h3>
                <p id="dashTotal">480</p>
            </div>
        </div>

        <div class="form-group">
            <input type="number" id="hinoInput" placeholder="Digite o número..." min="1" readonly>
        </div>

        <div class="tipo-evento-container">
            <label for="tipoEvento">Tipo de chamada</label>
            <select id="tipoEvento" class="tipo-evento-select" onchange="atualizarTabela()">
                <option value="culto">Culto</option>
                <option value="ensaio">Ensaio</option>
            </select>
        </div>

        <div class="teclado-container">
            <button class="teclado-btn" onclick="tecladoDigitar(1)">1</button>
            <button class="teclado-btn" onclick="tecladoDigitar(2)">2</button>
            <button class="teclado-btn" onclick="tecladoDigitar(3)">3</button>
            
            <button class="teclado-btn" onclick="tecladoDigitar(4)">4</button>
            <button class="teclado-btn" onclick="tecladoDigitar(5)">5</button>
            <button class="teclado-btn" onclick="tecladoDigitar(6)">6</button>
            
            <button class="teclado-btn" onclick="tecladoDigitar(7)">7</button>
            <button class="teclado-btn" onclick="tecladoDigitar(8)">8</button>
            <button class="teclado-btn" onclick="tecladoDigitar(9)">9</button>
            
            <button class="teclado-btn btn-acao-apagar" onclick="tecladoApagar()">Apagar</button>
            <button class="teclado-btn" onclick="tecladoDigitar(0)">0</button>
            <button class="teclado-btn btn-acao-confirmar" onclick="registrarHino()">Ok</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="mudarAba('mais', event)">Mais chamados</button>
            <button class="tab-btn" onclick="mudarAba('menos', event)">Menos chamados</button>
            <button class="tab-btn" onclick="mudarAba('nunca', event)">Nunca chamados</button>
        </div>

        <div class="historico-section">
            <table>
                <thead>
                    <tr>
                        <th>Hino</th>
                        <th id="colunaStatus">Status / Qtd</th>
                    </tr>
                </thead>
                <tbody id="tabelaHinos">
                    <tr><td colspan="2" style="text-align:center; color:var(--texto-secundario);">Nenhum hino registrado ainda.</td></tr>
                </tbody>
            </table>
        </div>

        <button class="btn-limpar" onclick="limparDados()">Zerar Contagem na Nuvem</button>
    </div>

    <script>
        // ================= CONFIGURAÇÃO DO FIREBASE =================
        // Altere este link para o link correto da sua Realtime Database se necessário
        const FIREBASE_URL = "https://contador-de-hinos-default-rtdb.firebaseio.com/hinos.json"; 
        const TOTAL_DE_HINOS = 480; 
        // ============================================================

        let controleHinos = {};
        let abaAtual = 'mais';

        function normalizarControleHinos(dados) {
            const controleVazio = { culto: {}, ensaio: {} };

            if (!dados || typeof dados !== 'object' || Array.isArray(dados)) {
                return controleVazio;
            }

            if (dados.culto || dados.ensaio) {
                return {
                    culto: (dados.culto && typeof dados.culto === 'object') ? dados.culto : {},
                    ensaio: (dados.ensaio && typeof dados.ensaio === 'object') ? dados.ensaio : {}
                };
            }

            return {
                culto: dados,
                ensaio: {}
            };
        }

        function obterTipoEventoAtual() {
            return document.getElementById('tipoEvento').value;
        }

        function obterControleAtual() {
            const tipoEvento = obterTipoEventoAtual();
            if (!controleHinos[tipoEvento] || typeof controleHinos[tipoEvento] !== 'object') {
                controleHinos[tipoEvento] = {};
            }
            return controleHinos[tipoEvento];
        }

        // --- SISTEMA DE TEMA (CLARO / ESCURO) ---
        const temaSalvo = localStorage.getItem('tema_app') || 'dark';
        document.documentElement.setAttribute('data-theme', temaSalvo);
        atualizarIconeBotaoTema(temaSalvo);

        function alternarTema() {
            const temaAtual = document.documentElement.getAttribute('data-theme');
            const novoTema = temaAtual === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', novoTema);
            localStorage.setItem('tema_app', novoTema);
            atualizarIconeBotaoTema(novoTema);
        }

        function atualizarIconeBotaoTema(tema) {
            const btn = document.getElementById('themeToggleBtn');
            btn.innerText = tema === 'dark' ? '☀️' : '🌙';
        }

        // --- FETCH DE DADOS (FIREBASE + BACKUP SEGURO) ---
        baixarDadosFirebase();

        async function baixarDadosFirebase() {
            const statusDiv = document.getElementById('statusConexao');
            try {
                const response = await fetch(FIREBASE_URL);
                const dados = await response.json();
                
                if (dados && (dados.error || dados.rules || typeof dados === 'string')) {
                    throw new Error("Erro de permissões.");
                }
                
                controleHinos = normalizarControleHinos(dados);
                statusDiv.innerText = "Sincronizado com a Nuvem";
                statusDiv.style.color = "#4ade80"; 
                atualizarTabela();
            } catch (error) {
                console.error("Erro ao procurar dados:", error);
                statusDiv.innerText = "Modo Offline (Usando Backup)";
                statusDiv.style.color = "#f87171";
                
                // Se o Firebase falhar ou o telemóvel bloquear, tenta carregar o backup local com segurança
                try {
                    controleHinos = normalizarControleHinos(JSON.parse(localStorage.getItem('controleHinos_backup')));
                } catch(e) {
                    controleHinos = normalizarControleHinos({});
                }
                atualizarTabela();
            }
        }

        // TECLADO VIRTUAL
        function tecladoDigitar(num) {
            const input = document.getElementById('hinoInput');
            if (input.value === "" && num === 0) return;
            input.value += num;
        }

        function tecladoApagar() {
            const input = document.getElementById('hinoInput');
            input.value = input.value.slice(0, -1);
        }

        async function registrarHino() {
            const input = document.getElementById('hinoInput');
            const numeroHino = parseInt(input.value.trim());

            if (isNaN(numeroHino) || numeroHino <= 0 || numeroHino > TOTAL_DE_HINOS) {
                alert(`Por favor, introduza um hino válido (1 a ${TOTAL_DE_HINOS}).`);
                input.value = '';
                return;
            }

            const controleAtual = obterControleAtual();

            if (controleAtual[numeroHino]) {
                controleAtual[numeroHino] += 1;
            } else {
                controleAtual[numeroHino] = 1;
            }

            input.value = '';
            atualizarTabela(); 
            await enviarDadosFirebase();
        }

        async function enviarDadosFirebase() {
            try {
                // Guarda sempre um backup de segurança caso o navegador do telemóvel limpe a memória
                localStorage.setItem('controleHinos_backup', JSON.stringify(controleHinos));
                
                await fetch(FIREBASE_URL, {
                    method: 'PUT',
                    body: JSON.stringify(controleHinos),
                    headers: { 'Content-Type': 'application/json' }
                });
                document.getElementById('statusConexao').innerText = "Alterações salvas na nuvem!";
                document.getElementById('statusConexao').style.color = "#4ade80";
            } catch (error) {
                console.error("Erro ao guardar dados:", error);
                document.getElementById('statusConexao').innerText = "Erro ao sincronizar na nuvem";
                document.getElementById('statusConexao').style.color = "#fb923c";
            }
        }

        function mudarAba(aba, event) {
            abaAtual = aba;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            atualizarTabela();
        }

        function atualizarDashboard(qtdDiferentes) {
            const faltam = TOTAL_DE_HINOS - qtdDiferentes;
            document.getElementById('dashChamados').innerText = qtdDiferentes;
            document.getElementById('dashFaltam').innerText = faltam;
            document.getElementById('dashTotal').innerText = TOTAL_DE_HINOS;
        }

        function atualizarTabela() {
            const tbody = document.getElementById('tabelaHinos');
            const colunaStatus = document.getElementById('colunaStatus');
            tbody.innerHTML = '';

            const controleAtual = obterControleAtual();
            const hinosRegistrados = Object.entries(controleAtual)
                .filter(([hino, qtd]) => !isNaN(hino) && hino !== "null" && qtd !== null && typeof qtd === 'number')
                .map(([hino, qtd]) => [parseInt(hino), qtd]);

            atualizarDashboard(hinosRegistrados.length);

            let hinosExibir = [];

            if (abaAtual === 'mais') {
                colunaStatus.innerText = "Vezes Chamado";
                hinosExibir = [...hinosRegistrados].sort((a, b) => b[1] - a[1]);
                if (hinosExibir.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="2" style="text-align:center; color:var(--texto-secundario);">Nenhum hino registrado ainda.</td></tr>`;
                    return;
                }
                gerarLinesTabela(hinosExibir, 'mais');

            } else if (abaAtual === 'menos') {
                colunaStatus.innerText = "Vezes Chamado";
                hinosExibir = [...hinosRegistrados].sort((a, b) => a[1] - b[1]);
                if (hinosExibir.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="2" style="text-align:center; color:var(--texto-secundario);">Nenhum hino registrado ainda.</td></tr>`;
                    return;
                }
                gerarLinesTabela(hinosExibir, 'menos');

            } else if (abaAtual === 'nunca') {
                colunaStatus.innerText = "Status";
                const chavesAtivas = hinosRegistrados.map(([hino]) => hino);
                for (let i = 1; i <= TOTAL_DE_HINOS; i++) {
                    if (chavesAtivas.indexOf(i) === -1) {
                        hinosExibir.push([i, 0]);
                    }
                }
                if (hinosExibir.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="2" style="text-align:center; color:#4ade80; font-weight:bold;">Todos os hinos já foram chamados!</td></tr>`;
                    return;
                }
                gerarLinesTabela(hinosExibir, 'nunca');
            }
        }

        function gerarLinesTabela(listaHinos, tipo) {
            const tbody = document.getElementById('tabelaHinos');
            
            listaHinos.forEach(([hino, quantidade]) => {
                const tr = document.createElement('tr');
                let badgeClass = 'qtd-badge';
                let textoQuantidade = `${quantidade}x`;

                if (tipo === 'menos') badgeClass += ' menos';
                if (tipo === 'nunca') {
                    badgeClass += ' nunca';
                    textoQuantidade = 'Nunca';
                }

                tr.innerHTML = `
                    <td class="hino-num">Hino ${hino}</td>
                    <td><span class="${badgeClass}">${textoQuantidade}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function limparDados() {
            if (confirm('Tem certeza que deseja apagar todo o histórico de contagem de Culto e Ensaio na NUVEM?')) {
                controleHinos = normalizarControleHinos({});
                atualizarTabela();
                
                try {
                    await fetch(FIREBASE_URL, { method: 'DELETE' });
                    localStorage.removeItem('controleHinos_backup');
                    document.getElementById('statusConexao').innerText = "Banco de dados zerado!";
                    document.getElementById('statusConexao').style.color = "#4ade80";
                } catch (e) {
                    alert("Erro ao zerar dados na nuvem.");
                }
            }
        }
    </script>
</body>
</html>
